name: qwen-lumi
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  # On LUMI, load the rocm module first:
  #   module load rocm/6.2.2
  # Then install PyTorch ROCm wheel via pip (see scripts/install_deps.sh)

  - pip:
    - torch>=2.4.0
    - transformers==4.52.4
    - accelerate>=1.0.0
    - peft>=0.13.0
    - datasets>=3.0.0
    - trl>=0.12.0
    - tokenizers>=0.20.0
    - sentencepiece
    - jupyterlab>=4.2.0
    - ipywidgets>=8.1.0
    - huggingface_hub>=0.25.0
    - numpy>=1.26.0
    - pandas>=2.2.0
    - matplotlib>=3.9.0
    - tqdm>=4.66.0
    - psutil>=6.0.0
    - wandb>=0.18.0
    - tensorboard>=2.18.0
